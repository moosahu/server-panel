<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>مركز التحكم — تسجيل الدخول</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Cairo',sans-serif;background:#0f172a;color:#e2e8f0;
  min-height:100vh;display:flex;align-items:center;justify-content:center}
.wrap{width:100%;max-width:420px;padding:20px}
.card{background:#1e293b;border:1px solid #334155;border-radius:20px;padding:44px 36px;text-align:center}
.brand{margin-bottom:28px}
.brand-icon{font-size:52px;display:block;margin-bottom:12px}
.brand-name{font-size:22px;font-weight:900;color:#f1f5f9}
.brand-sub{font-size:12px;color:#64748b;margin-top:4px}
.server-badge{display:inline-flex;align-items:center;gap:6px;
  background:#0f172a;border:1px solid #1e3a5f;border-radius:100px;
  padding:5px 14px;font-size:11px;color:#60a5fa;margin-top:10px;font-family:monospace}
.dot{width:7px;height:7px;border-radius:50%;background:#22c55e;
  animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.form-group{margin-bottom:16px;text-align:right}
label{display:block;font-size:12px;color:#94a3b8;margin-bottom:6px;font-weight:600}
input[type=password]{
  width:100%;padding:13px 16px;
  background:#0f172a;border:1.5px solid #334155;
  border-radius:12px;color:#f1f5f9;
  font-family:'Cairo',sans-serif;font-size:14px;
  outline:none;transition:.2s;direction:ltr;text-align:center}
input[type=password]:focus{border-color:#3b82f6;box-shadow:0 0 0 3px rgba(59,130,246,.15)}
button{width:100%;padding:14px;
  background:linear-gradient(135deg,#3b82f6,#1d4ed8);
  color:#fff;border:none;border-radius:12px;
  font-family:'Cairo',sans-serif;font-size:15px;font-weight:700;
  cursor:pointer;transition:.2s;margin-top:4px}
button:hover{filter:brightness(1.1);transform:translateY(-1px)}
.err{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);
  color:#fca5a5;border-radius:10px;padding:11px 14px;
  font-size:13px;margin-bottom:16px;display:flex;align-items:center;gap:8px}
</style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <div class="brand">
      <span class="brand-icon">⚡</span>
      <div class="brand-name">مركز التحكم</div>
      <div class="brand-sub">Server Control Panel</div>
      <div class="server-badge"><span class="dot"></span>84.8.100.70</div>
    </div>
    {% if error %}
    <div class="err">🔒 {{ error }}</div>
    {% endif %}
    <form method="POST">
      <div class="form-group">
        <label>كلمة المرور</label>
        <input type="password" name="password" placeholder="••••••••••" autofocus>
      </div>
      <button type="submit">دخول إلى مركز التحكم</button>
    </form>
  </div>
</div>
</body>
</html>
